name: Build and Release

on:
  push:
    tags:
      - 'v*'   # 打标签时触发，如 v1.0.0

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build and package
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: |
          npx electron-vite build
          npx electron-builder --win --publish=never
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: wifi-time-tracker-windows
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build and package
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: |
          npx electron-vite build
          npx electron-builder --mac --universal --publish=never
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: wifi-time-tracker-macos
          path: |
            release/*.dmg
            release/*.dmg.blockmap

  release:
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp -r artifacts/wifi-time-tracker-windows/*.exe release-files/ 2>/dev/null || true
          cp -r artifacts/wifi-time-tracker-macos/*.dmg release-files/ 2>/dev/null || true
          ls -la release-files/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WiFi Time Tracker ${{ github.ref_name }}
          body: |
            ## WiFi Time Tracker ${{ github.ref_name }}

            📶 自动统计电脑联网时长，支持法定节假日识别。

            ### 功能

            - **实时统计** — 自动记录今日联网时长，每秒更新
            - **工作日历** — 月视图展示每日联网状态（绿/黄/红标识）
            - **工作时长提醒** — 自定义规则 + 桌面弹窗通知（最多5个时间点）
            - **法定节假日** — 识别春节/国庆/调休等，仅工作日检测
            - **历史趋势** — 7天/30天联网时长柱状图
            - **数据导出** — CSV 格式导出全部记录
            - **开机自启** — 可选后台自动运行

            ### 下载

            - **Windows**: `WiFi Time Tracker Setup *.exe`
            - **macOS**: `WiFi Time Tracker *.dmg`

            ### 使用说明

            安装后 App 自动在系统托盘后台运行，无需操作即可自动记录联网时长。
            双击托盘 📶 图标查看统计面板。

            > ⚠️ macOS 首次打开: 右键 App → 打开 或 系统设置 → 隐私与安全性 → 仍要打开
          files: release-files/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
